<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{项目名}}——{{版本号}} {{需求名称}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "微软雅黑", "Microsoft YaHei", sans-serif; background: #F0F2F5; color: #333; overflow: hidden; height: 100vh; }

        /* ===== 顶部栏 ===== */
        .top-bar {
            height: 48px; background: #001529; color: #FFF; display: flex; align-items: center;
            padding: 0 20px; font-size: 14px; position: fixed; top: 0; left: 0; right: 0; z-index: 100;
        }
        .top-bar .logo { font-size: 15px; font-weight: bold; color: #FFF; margin-right: 24px; white-space: nowrap; }
        .top-bar .breadcrumb { color: rgba(255,255,255,0.65); font-size: 13px; }
        .top-bar .breadcrumb a { color: rgba(255,255,255,0.85); text-decoration: none; }
        .top-bar .meta { margin-left: auto; color: rgba(255,255,255,0.45); font-size: 12px; white-space: nowrap; }

        /* ===== 左侧目录栏 ===== */
        .sidebar {
            position: fixed; top: 48px; left: 0; bottom: 0; width: 240px;
            background: #FFF; border-right: 1px solid #E8E8E8; overflow-y: auto; z-index: 50;
            padding: 12px 0; transition: width 0.25s ease, transform 0.25s ease;
        }
        .sidebar.collapsed { width: 0; padding: 0; overflow: hidden; border-right: none; }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: #D9D9D9; border-radius: 2px; }

        /* 目录收起/展开按钮 */
        .sidebar-toggle {
            position: fixed; top: 56px; left: 240px; z-index: 60;
            width: 24px; height: 48px; background: #FFF; border: 1px solid #E0E0E0;
            border-left: none; border-radius: 0 6px 6px 0; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: #666; transition: left 0.25s ease;
            box-shadow: 2px 0 4px rgba(0,0,0,0.06);
        }
        .sidebar-toggle:hover { background: #F0F5FF; color: #1890FF; }
        .sidebar-toggle.collapsed { left: 0; }
        .sidebar .sidebar-title {
            padding: 8px 16px; font-size: 12px; color: #999; text-transform: uppercase; letter-spacing: 1px;
        }
        /* 目录分组 */
        .nav-group { margin-bottom: 4px; }
        .nav-group-title {
            padding: 8px 16px; font-size: 13px; font-weight: bold; color: #333; cursor: pointer;
            display: flex; align-items: center; gap: 6px; user-select: none;
        }
        .nav-group-title:hover { background: #F5F5F5; }
        .nav-group-title .arrow { font-size: 10px; color: #999; transition: transform 0.2s; }
        .nav-group-title .arrow.open { transform: rotate(90deg); }
        .nav-group-items { overflow: hidden; }
        .nav-group-items.collapsed { display: none; }
        .nav-item {
            padding: 7px 16px 7px 32px; font-size: 13px; color: #555; cursor: pointer;
            display: flex; align-items: center; gap: 6px; transition: all 0.15s;
            border-left: 3px solid transparent;
        }
        .nav-item:hover { background: #F0F5FF; color: #1890FF; }
        .nav-item.active { background: #E6F7FF; color: #1890FF; border-left-color: #1890FF; font-weight: bold; }
        .nav-item .dot { width: 5px; height: 5px; border-radius: 50%; background: #D9D9D9; flex-shrink: 0; }
        .nav-item.active .dot { background: #1890FF; }
        .nav-item .badge { font-size: 11px; background: #FF4D4F; color: #FFF; padding: 0 5px; border-radius: 8px; margin-left: auto; }

        /* ===== 主内容区（无限画布） ===== */
        .main-area {
            position: fixed; top: 48px; left: 240px; right: 0; bottom: 0;
            display: flex; overflow: auto; transition: left 0.25s ease;
        }
        .main-area.expanded { left: 0; }
        .main-area::-webkit-scrollbar { width: 8px; height: 8px; }
        .main-area::-webkit-scrollbar-thumb { background: #C1C1C1; border-radius: 4px; }
        .main-area::-webkit-scrollbar-corner { background: #F0F2F5; }

        /* 左侧原型浏览区 —— 不压缩，按内容自然撑开 */
        .proto-panel {
            flex-shrink: 0; overflow-y: auto; overflow-x: visible;
            background: #F5F5F5; padding: 20px;
        }
        .proto-panel::-webkit-scrollbar { width: 6px; }
        .proto-panel::-webkit-scrollbar-thumb { background: #C1C1C1; border-radius: 3px; }

        /* 右侧说明面板 —— 不压缩，按内容自然撑开 */
        .desc-panel {
            flex-shrink: 0; background: #FFF; border-left: 1px solid #E0E0E0;
            overflow-y: auto; padding: 0;
        }
        .desc-panel::-webkit-scrollbar { width: 5px; }
        .desc-panel::-webkit-scrollbar-thumb { background: #D9D9D9; border-radius: 3px; }

        /* 说明面板头部 */
        .desc-header {
            padding: 16px 20px; border-bottom: 1px solid #F0F0F0;
            position: sticky; top: 0; background: #FFF; z-index: 10;
        }
        .desc-header h2 { font-size: 16px; color: #333; margin-bottom: 4px; }
        .desc-header .desc-breadcrumb { font-size: 12px; color: #999; }
        .desc-content { padding: 16px 24px; min-width: 600px; }

        /* ===== 页面切换 ===== */
        .page-section { display: none; }
        .page-section.active { display: block; }

        /* ===== 原型区通用样式 ===== */
        .proto-card {
            background: #FFF; border: 1px solid #E8E8E8; border-radius: 6px;
            margin-bottom: 20px; overflow: hidden; min-width: 1400px;
        }
        .proto-card-title {
            background: #FAFAFA; padding: 10px 16px; font-size: 13px; color: #666;
            border-bottom: 1px solid #E8E8E8; font-weight: bold;
        }
        .proto-card-body { padding: 20px; }

        /* ===== 需求概述卡片 ===== */
        .overview-card {
            background: #FFF; border-left: 4px solid #1890FF; padding: 16px 20px;
            margin-bottom: 20px; border-radius: 0 6px 6px 0; border: 1px solid #E8E8E8; border-left: 4px solid #1890FF;
            min-width: 1400px;
        }
        .overview-card h3 { font-size: 14px; color: #1890FF; margin-bottom: 8px; }
        .overview-card p { font-size: 14px; color: #555; line-height: 1.8; }

        /* ===== 标注颜色体系 ===== */
        .c-key { color: #9B0000; font-weight: bold; }
        .c-warn { color: #CA0606; }
        .c-note { color: #0076FF; }
        .c-hint { color: #D46B08; }
        .c-green { color: #2E7D32; }
        .c-gray { color: #999; }

        /* 说明框 */
        .note-box {
            background: #FFF8E1; border-left: 3px solid #D46B08; padding: 10px 14px;
            margin: 10px 0; font-size: 13px; color: #8B6914; border-radius: 0 4px 4px 0; line-height: 1.8;
        }
        .info-box {
            background: #E8F4FF; border-left: 3px solid #1890FF; padding: 10px 14px;
            margin: 10px 0; font-size: 13px; color: #333; border-radius: 0 4px 4px 0; line-height: 1.8;
        }
        .danger-box {
            background: #FFF1F0; border-left: 3px solid #FF4D4F; padding: 10px 14px;
            margin: 10px 0; font-size: 13px; color: #A8071A; border-radius: 0 4px 4px 0; line-height: 1.8;
        }

        /* ===== 右侧说明区排版 ===== */
        .desc-content .sub-title {
            font-size: 14px; font-weight: bold; color: #333; margin-top: 16px; margin-bottom: 6px;
            padding-left: 8px; border-left: 3px solid #1890FF;
        }
        .desc-content .sub-title:first-child { margin-top: 0; }
        .desc-content p { font-size: 13px; color: #333; line-height: 2; margin-bottom: 2px; }
        .desc-content .indent { padding-left: 16px; }
        .desc-divider { border: none; border-top: 1px dashed #E8E8E8; margin: 16px 0; }

        /* ===== Mock UI 组件 ===== */
        .mock-toolbar {
            display: flex; align-items: center; gap: 8px; padding: 8px 12px;
            background: #FAFAFA; border: 1px solid #E8E8E8; border-radius: 4px; margin-bottom: 12px;
        }
        .mock-btn {
            display: inline-block; padding: 4px 12px; font-size: 12px; border-radius: 3px; cursor: default; white-space: nowrap;
        }
        .mock-btn-primary { background: #1890FF; color: #FFF; }
        .mock-btn-default { background: #FFF; border: 1px solid #D9D9D9; color: #333; }
        .mock-btn-danger { background: #FFF; border: 1px solid #FF4D4F; color: #FF4D4F; }
        .mock-input {
            display: inline-block; width: 140px; padding: 4px 8px; border: 1px solid #D9D9D9;
            border-radius: 3px; font-size: 12px; color: #BFBFBF;
        }
        .mock-select {
            display: inline-block; padding: 4px 8px; border: 1px solid #D9D9D9;
            border-radius: 3px; font-size: 12px; color: #333; min-width: 100px;
        }
        .mock-divider { width: 1px; height: 20px; background: #E0E0E0; }

        .mock-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .mock-table th {
            background: #FAFAFA; border: 1px solid #E8E8E8; padding: 8px 10px;
            text-align: left; font-weight: bold; color: #333; white-space: nowrap;
        }
        .mock-table td { border: 1px solid #E8E8E8; padding: 8px 10px; color: #555; }
        .mock-table tr.selected td { background: #E6F7FF; }
        .mock-checkbox {
            width: 14px; height: 14px; border: 1px solid #D9D9D9; border-radius: 2px;
            display: inline-block; vertical-align: middle; position: relative;
        }
        .mock-checkbox.checked { background: #1890FF; border-color: #1890FF; }
        .mock-checkbox.checked::after { content: "\2713"; color: #FFF; font-size: 10px; position: absolute; top: -1px; left: 1px; }
        .mock-tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 11px; }
        .mock-tag-blue { background: #E6F7FF; color: #1890FF; border: 1px solid #91D5FF; }
        .mock-tag-green { background: #F6FFED; color: #52C41A; border: 1px solid #B7EB8F; }
        .mock-tag-orange { background: #FFF7E6; color: #FA8C16; border: 1px solid #FFD591; }
        .mock-link { color: #1890FF; text-decoration: none; font-size: 12px; }

        .highlight-box { border: 2px dashed #FF4D4F; border-radius: 4px; padding: 2px 4px; display: inline-block; }
        .annotation-marker {
            display: inline-block; background: #FF4D4F; color: #FFF; font-size: 10px;
            padding: 1px 6px; border-radius: 8px; margin-left: 2px; vertical-align: middle;
        }

        .mock-pagination {
            display: flex; justify-content: flex-end; align-items: center; gap: 4px;
            padding: 8px 0; font-size: 12px; color: #666;
        }
        .mock-page-btn {
            display: inline-block; width: 24px; height: 24px; line-height: 24px;
            text-align: center; border: 1px solid #D9D9D9; border-radius: 3px; font-size: 11px;
        }
        .mock-page-active { background: #1890FF; color: #FFF; border-color: #1890FF; }

        /* 流程图 */
        .flow-container { display: flex; align-items: center; gap: 0; margin: 12px 0; flex-wrap: wrap; }
        .flow-node {
            background: #FFF; border: 1px solid #D9D9D9; border-radius: 4px;
            padding: 6px 14px; font-size: 12px; text-align: center; white-space: nowrap;
        }
        .flow-node-active { border-color: #1890FF; color: #1890FF; }
        .flow-node-warn { border-color: #FF4D4F; color: #FF4D4F; }
        .flow-node-diamond { background: #FFF8E1; border: 1px solid #D46B08; border-radius: 4px; padding: 6px 12px; font-size: 12px; color: #8B6914; }
        .flow-arrow { font-size: 16px; color: #BFBFBF; padding: 0 6px; }

        /* 弹窗模拟 */
        .mock-modal {
            border: 1px solid #D9D9D9; border-radius: 6px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08); max-width: 460px;
        }
        .mock-modal-header {
            padding: 12px 16px; border-bottom: 1px solid #F0F0F0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .mock-modal-header strong { font-size: 14px; }
        .mock-modal-body { padding: 16px; }
        .mock-modal-footer { padding: 10px 16px; border-top: 1px solid #F0F0F0; text-align: right; }

        .form-label { font-size: 12px; color: #333; margin-bottom: 4px; }
        .form-label .req { color: red; }

        /* 影响范围卡片 */
        .impact-card {
            background: #FFF; border-left: 4px solid #FF4D4F; padding: 16px 20px;
            border-radius: 0 6px 6px 0; border: 1px solid #E8E8E8; border-left: 4px solid #FF4D4F;
            min-width: 1400px;
        }
        .impact-card h3 { font-size: 14px; color: #FF4D4F; margin-bottom: 8px; }
        .impact-card p { font-size: 13px; line-height: 2; color: #555; }
    </style>
</head>
<body>

<!-- ===== 顶部栏 ===== -->
<div class="top-bar">
    <span class="logo">{{项目Logo文字}}</span>
    <span class="breadcrumb">{{面包屑导航}}</span>
    <span class="meta">{{版本号}} &nbsp;|&nbsp; {{日期}} &nbsp;|&nbsp; 产品经理：{{姓名}}</span>
</div>

<!-- ===== 左侧目录导航 ===== -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-title">📑 需求目录</div>

    <!--
    === 目录分组模板 ===
    每个版本一个 nav-group，可折叠
    每个页面一个 nav-item，onclick="switchPage('page-xxx', this)"
    新页面加 <span class="badge">新</span>

    <div class="nav-group">
        <div class="nav-group-title" onclick="toggleGroup(this)">
            <span class="arrow open">▶</span> 版本名称
        </div>
        <div class="nav-group-items">
            <div class="nav-item active" onclick="switchPage('page-overview', this)">
                <span class="dot"></span> 需求概述
            </div>
            <div class="nav-item" onclick="switchPage('page-xxx', this)">
                <span class="dot"></span> 页面名称
                <span class="badge">新</span>
            </div>
        </div>
    </div>
    -->
</div>

<!-- 目录收起/展开按钮 -->
<div class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="收起目录">◀</div>

<!-- ===== 主内容区 ===== -->
<div class="main-area">

    <!-- ========== 左侧：原型浏览区 ========== -->
    <div class="proto-panel" id="protoPanel">

        <!--
        === 页面模板 ===
        每个页面一个 page-section，ID 格式：page-英文标识
        第一个页面加 class="active"

        <div class="page-section active" id="page-overview">
            ... 原型内容（使用 mock 组件） ...
        </div>
        -->

    </div>

    <!-- ========== 右侧：需求说明面板 ========== -->
    <div class="desc-panel" id="descPanel">

        <!--
        === 说明模板 ===
        每个页面对应一个 desc-英文标识 的说明区
        ID 与左侧 page-xxx 对应：desc-xxx

        <div class="page-section active" id="desc-overview">
            <div class="desc-header">
                <div class="desc-breadcrumb">版本 > 页面名</div>
                <h2>标题</h2>
            </div>
            <div class="desc-content">
                <div class="sub-title">1.1 子标题</div>
                <p class="indent">说明文字，用 <span class="c-key">关键条件</span> 标注</p>
                <div class="note-box">提示说明</div>
                <div class="info-box">补充说明</div>
                <div class="danger-box">警告说明</div>
            </div>
        </div>
        -->

    </div>
</div>

<script>
    // 页面切换
    function switchPage(pageId, navEl) {
        // 左侧原型区切换
        document.querySelectorAll('#protoPanel .page-section').forEach(el => el.classList.remove('active'));
        const target = document.getElementById(pageId);
        if (target) target.classList.add('active');

        // 右侧说明区切换（page-xxx → desc-xxx）
        const descId = pageId.replace('page-', 'desc-');
        document.querySelectorAll('#descPanel .page-section').forEach(el => el.classList.remove('active'));
        const descTarget = document.getElementById(descId);
        if (descTarget) descTarget.classList.add('active');

        // 导航高亮
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        if (navEl) navEl.classList.add('active');

        // 滚动到顶部
        document.getElementById('protoPanel').scrollTop = 0;
        document.getElementById('descPanel').scrollTop = 0;

        // 更新 URL hash
        if (window.location.hash.replace('#', '') !== pageId) {
            history.replaceState(null, '', '#' + pageId);
        }
    }

    // 目录分组折叠
    function toggleGroup(titleEl) {
        const items = titleEl.nextElementSibling;
        const arrow = titleEl.querySelector('.arrow');
        items.classList.toggle('collapsed');
        arrow.classList.toggle('open');
    }

    // 目录栏收起/展开
    function toggleSidebar() {
        var sidebar = document.getElementById('sidebar');
        var toggle = document.getElementById('sidebarToggle');
        var mainArea = document.querySelector('.main-area');
        var isCollapsed = sidebar.classList.toggle('collapsed');
        toggle.classList.toggle('collapsed', isCollapsed);
        mainArea.classList.toggle('expanded', isCollapsed);
        toggle.innerHTML = isCollapsed ? '▶' : '◀';
        toggle.title = isCollapsed ? '展开目录' : '收起目录';
    }

    // URL hash 路由支持
    window.addEventListener('DOMContentLoaded', function() {
        var hash = window.location.hash.replace('#', '');
        if (hash) {
            var navEl = document.querySelector('[onclick*="' + hash + '"]');
            switchPage(hash, navEl);
        }
    });
    window.addEventListener('hashchange', function() {
        var hash = window.location.hash.replace('#', '');
        if (hash) {
            var navEl = document.querySelector('[onclick*="' + hash + '"]');
            switchPage(hash, navEl);
        }
    });

    // ===== Space + Drag 画布平移（Axure 方案） =====
    (function() {
        var spaceDown = false;
        var dragging = false;
        var mouseX, mouseY;
        var mainArea, protoPanel, descPanel;

        document.addEventListener('keydown', function(e) {
            if (e.key !== ' ') return;
            var t = (e.target.tagName || '').toLowerCase();
            if (t === 'input' || t === 'textarea' || t === 'select') return;
            e.preventDefault();
            if (spaceDown) return;
            spaceDown = true;
            enableDragMode();
        });

        document.addEventListener('keyup', function(e) {
            if (e.key !== ' ') return;
            spaceDown = false;
            disableDragMode();
        });

        function enableDragMode() {
            mainArea = document.querySelector('.main-area');
            protoPanel = document.getElementById('protoPanel');
            descPanel = document.getElementById('descPanel');

            if (!document.getElementById('dragOverlay')) {
                var overlay = document.createElement('div');
                overlay.id = 'dragOverlay';
                overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:99999;cursor:grab;';
                document.body.appendChild(overlay);
            }

            var overlay = document.getElementById('dragOverlay');
            overlay.addEventListener('mousedown', startDrag);
        }

        function disableDragMode() {
            if (dragging) stopDrag();
            var overlay = document.getElementById('dragOverlay');
            if (overlay) {
                overlay.removeEventListener('mousedown', startDrag);
                overlay.remove();
            }
        }

        function startDrag(e) {
            e.preventDefault();
            dragging = true;
            mouseX = e.clientX;
            mouseY = e.clientY;

            var overlay = document.getElementById('dragOverlay');
            if (overlay) overlay.style.cursor = 'grabbing';

            document.addEventListener('mousemove', onDrag);
            document.addEventListener('mouseup', stopDrag);
        }

        function onDrag(e) {
            if (!dragging) return;
            var changeX = e.clientX - mouseX;
            var changeY = e.clientY - mouseY;

            mainArea.scrollLeft -= changeX;
            if (protoPanel) protoPanel.scrollTop -= changeY;
            if (descPanel) descPanel.scrollTop -= changeY;

            mouseX = e.clientX;
            mouseY = e.clientY;
        }

        function stopDrag() {
            dragging = false;
            var overlay = document.getElementById('dragOverlay');
            if (overlay) overlay.style.cursor = 'grab';
            document.removeEventListener('mousemove', onDrag);
            document.removeEventListener('mouseup', stopDrag);
        }

        window.addEventListener('blur', function() {
            spaceDown = false;
            disableDragMode();
        });
    })();
</script>
</body>
</html>
